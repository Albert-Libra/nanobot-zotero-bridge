zotero:
  library_id: ""        # Your Zotero user ID (from https://www.zotero.org/settings/keys)
  api_key: ""           # Create at https://www.zotero.org/settings/keys/new
  library_type: "user"  # "user" for personal, "group" for group library

sync:
  default_depth: 1      # 0=metadata, 1=+abstract, 2=+fulltext, 3=+summary+citations

pdf:
  download_enabled: true
  download_timeout: 60
  # PDF acquisition sources in priority order (first success wins):
  #   unpaywall  — legal OA via Unpaywall API (free, email for rate limit)
  #   scihub     — Sci-Hub fallback with mirror rotation
  sources: ["unpaywall", "scihub"]
  unpaywall:
    email: ""             # Your email (Unpaywall requires it for fair-use rate limits)
  scihub:
    mirrors:
      - "https://sci-hub.se"
      - "https://sci-hub.st"
      - "https://sci-hub.ru"

storage:
  data_dir: "../zotero-data"

summarization:
  auto_summarize_new: false
